<!-- TEMPLATE DE ÍCONE — Sistema de Cartões de Auxílio
     Grid: 24x24px | Área segura: 20x20px (margem 2px em cada lado)
     Stroke-width: 1.5 | Stroke-linecap: round | Stroke-linejoin: round
     Fill: none | Cor: currentColor
     
     Para criar um novo ícone:
     1. Copie este template
     2. Renomeie conforme o caso de uso
     3. Construa dentro da área de segurança (rect de guia: x=2, y=2, w=20, h=20)
     4. Remova o rect de guia antes de usar em produção
     5. Exporte como SVG e adicione ao sprite ou como componente React
-->
<svg
  viewBox="0 0 24 24"
  xmlns="http://www.w3.org/2000/svg"
  fill="none"
  stroke="currentColor"
  stroke-width="1.5"
  stroke-linecap="round"
  stroke-linejoin="round"
  aria-hidden="true"
>
  <!-- Área de segurança (remover na produção) -->
  <!-- <rect x="2" y="2" width="20" height="20" stroke="#FF000033" stroke-width="0.5" fill="none" stroke-dasharray="2,2"/> -->
  
  <!-- Seu path aqui dentro dos limites 2,2 → 22,22 -->
  <!-- Exemplo: linha simples diagonal -->
  <!-- <path d="M6 6L18 18"/> -->
  
</svg>
